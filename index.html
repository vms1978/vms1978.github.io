<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Приглашение на юбилей 50 лет - 07 июня 2026">
    <title>Приглашение на юбилей 50 лет</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #f3e5f5 0%, #e1bee7 50%, #f3e5f5 100%);
            color: #4a148c; overflow-x: hidden; line-height: 1.8; text-align: center;
        }
        .music-btn {
            position: fixed; top: 20px; right: 20px; z-index: 10000;
            width: 55px; height: 55px; border-radius: 50%; background: white;
            border: 2px solid #ba68c8; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            box-shadow: 0 5px 20px rgba(186, 104, 200, 0.3); transition: all 0.3s; font-size: 1.5rem;
        }
        .music-btn:hover { transform: scale(1.1); }
        .music-btn.playing {
            animation: pulse 1.5s infinite;
            background: linear-gradient(135deg, #ab47bc, #8e24aa); color: white;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .bg-bokeh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0; opacity: 0.4;
            background: radial-gradient(circle at 20% 30%, rgba(186, 104, 200, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(206, 147, 216, 0.3) 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, rgba(225, 190, 231, 0.4) 0%, transparent 50%);
        }
        .confetti { position: fixed; width: 8px; height: 8px; top: -20px; z-index: 9999; pointer-events: none; }
